# Local Configuration - Default
# All processing runs on local GPU with no API calls

embedding:
  model_name: "sentence-transformers/all-mpnet-base-v2"
  device: "cuda"  # Use "cpu" if no GPU available
  batch_size: 32
  cache_dir: "./models/embeddings"
  dimension: 768

vectorstore:
  type: "chroma"
  persist_directory: "./data/vector_db"
  collection_name: "cheap_metadata_v1"
  distance_metric: "cosine"

  # Metadata fields to index for filtering
  metadata_fields:
    - "language"
    - "type"
    - "module"
    - "tags"

  # Index configuration
  index_config:
    # ChromaDB uses HNSW by default
    hnsw_space: "cosine"
    hnsw_construction_ef: 100
    hnsw_search_ef: 100

llm:
  provider: "ollama"

  # Ollama configuration
  ollama:
    base_url: "http://localhost:11434"
    model: "qwen2.5-coder:7b-instruct-q4_K_M"

    # Generation parameters
    temperature: 0.1  # Low for factual, grounded answers
    top_p: 0.9
    top_k: 40
    max_tokens: 1024
    context_length: 8192

    # Timeout settings
    timeout_seconds: 60

  # Prompt configuration
  prompts:
    system_message: |
      You are a metadata assistant that helps developers understand the CHEAP metadata framework.
      Answer questions using ONLY the provided metadata artifacts as context.
      Always cite your sources by referring to artifact names and IDs.
      If the provided context doesn't contain enough information to answer the question, say "I don't have enough information to answer that based on the available metadata."
      Be concise and technical. Focus on facts from the metadata, not general programming knowledge.

    citation_format: |
      Provide citations in the format: [ArtifactName] (ID: artifact_id)
      Example: The User class [User.java] (ID: java_User_abc123) has three required fields.

retrieval:
  # Semantic search parameters
  top_k: 5  # Number of results to retrieve
  similarity_threshold: 0.3  # Minimum cosine similarity (0-1)

  # Reranking (disabled for Phase 1)
  rerank: false

  # Hybrid search (disabled for Phase 1)
  hybrid_search:
    enabled: false
    keyword_weight: 0.3
    semantic_weight: 0.7

indexing:
  # Source directories to scan (for code metadata)
  source_paths:
    - "../cheap-core/src/main/java"
    - "../cheap-ts/src"
    - "../cheap-py/src"
    - "../cheap-rust/src"

  # Database connections (for database metadata)
  databases:
    # Example Odoo eCommerce database
    odoo_ecommerce:
      enabled: true  # Odoo is now running in Docker
      type: "postgresql"
      connection:
        host: "localhost"
        port: 5432
        database: "odoo"  # Odoo creates its own database
        user: "odoo"
        password: "${ODOO_DB_PASSWORD}"  # From environment variable
      schema: "public"
      # Optional: Limit to specific tables (omit to extract all tables)
      include_tables:
        - "sale_order"
        - "sale_order_line"
        - "product_product"
        - "product_template"
        - "product_category"
        - "res_partner"
        - "res_partner_category"
        - "account_move"
        - "account_move_line"
      tags: ["odoo", "ecommerce", "sales"]

    # Example SQLite test database
    test_sqlite:
      enabled: false  # Set to true to extract from SQLite
      type: "sqlite"
      connection:
        path: "./data/test.db"
      tags: ["test", "sqlite"]

  # Extraction configuration
  extractors:
    # Database extractors
    postgresql:
      enabled: true  # Enabled for Odoo database

    sqlite:
      enabled: false  # Enable when databases are configured

    # Code extractors
    java:
      enabled: true
      file_patterns: ["**/*.java"]
      exclude_patterns: ["**/test/**", "**/build/**"]

    typescript:
      enabled: true
      file_patterns: ["**/*.ts", "**/*.tsx"]
      exclude_patterns: ["**/node_modules/**", "**/dist/**", "**/*.test.ts"]

    python:
      enabled: true
      file_patterns: ["**/*.py"]
      exclude_patterns: ["**/venv/**", "**/__pycache__/**", "**/test_*.py"]

    rust:
      enabled: true
      file_patterns: ["**/*.rs"]
      exclude_patterns: ["**/target/**", "**/tests/**"]

  # Batch processing
  batch_size: 100
  max_workers: 4  # Parallel extraction workers

logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/cheap-rag.log"

api:
  host: "0.0.0.0"
  port: 8000
  cors_origins: ["http://localhost:3000", "http://localhost:5173"]

  # Rate limiting
  rate_limit:
    enabled: false  # Enable in production
    requests_per_minute: 60
