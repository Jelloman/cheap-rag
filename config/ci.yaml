# CI Configuration - GitHub Actions
# Identical to local.yaml except:
#   - local_files_only: false  (model downloaded from HuggingFace Hub)
#   - device: cpu              (no GPU in CI runners)
#   - pagila.enabled: false    (no live database in CI)

embedding:
  model_name: "sentence-transformers/all-mpnet-base-v2"
  device: "cpu"
  batch_size: 32
  cache_dir: "./models/embeddings"
  local_files_only: false
  dimension: 768

vectorstore:
  type: "chroma"
  persist_directory: "./data/vector_db"
  collection_name: "cheap_metadata_v1"
  distance_metric: "cosine"

  metadata_fields:
    - "language"
    - "type"
    - "module"
    - "tags"

  index_config:
    hnsw_space: "cosine"
    hnsw_construction_ef: 100
    hnsw_search_ef: 100

llm:
  provider: "ollama"

  ollama:
    base_url: "http://localhost:11434"
    model: "qwen2.5-coder:7b-instruct-q4_K_M"
    temperature: 0.1
    top_p: 0.9
    top_k: 40
    max_tokens: 1024
    context_length: 8192
    timeout_seconds: 60

  prompts:
    system_message: |
      You are a metadata assistant that helps developers understand the CHEAP metadata framework.
      Answer questions using ONLY the provided metadata artifacts as context.
      Always cite your sources by referring to artifact names and IDs.
      If the provided context doesn't contain enough information to answer the question, say "I don't have enough information to answer that based on the available metadata."
      Be concise and technical. Focus on facts from the metadata, not general programming knowledge.

    citation_format: |
      Provide citations in the format: [ArtifactName] (ID: artifact_id)
      Example: The User class [User.java] (ID: java_User_abc123) has three required fields.

retrieval:
  top_k: 5
  similarity_threshold: 0.3
  rerank: false
  hybrid_search:
    enabled: false
    keyword_weight: 0.3
    semantic_weight: 0.7

indexing:
  source_paths:
    - "../cheap"

  databases:
    pagila:
      enabled: false  # No live database in CI
      type: "postgresql"
      connection:
        host: "localhost"
        port: 5432
        database: "postgres"
        user: "postgres"
        password: ""
      schema: "public"
      include_tables: []
      tags: ["pagila", "dvd-rental", "sample"]

    test_sqlite:
      enabled: false
      type: "sqlite"
      connection:
        path: "./data/test.db"
      tags: ["test", "sqlite"]

  extractors:
    postgresql:
      enabled: false

    sqlite:
      enabled: false

    java:
      enabled: true
      file_patterns: ["**/*.java"]
      exclude_patterns: ["**/test/**", "**/build/**"]

    typescript:
      enabled: true
      file_patterns: ["**/*.ts", "**/*.tsx"]
      exclude_patterns: ["**/node_modules/**", "**/dist/**", "**/*.test.ts"]

    python:
      enabled: true
      file_patterns: ["**/*.py"]
      exclude_patterns: ["**/venv/**", "**/__pycache__/**", "**/test_*.py"]

    rust:
      enabled: true
      file_patterns: ["**/*.rs"]
      exclude_patterns: ["**/target/**", "**/tests/**"]

  batch_size: 100
  max_workers: 4

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/cheap-rag.log"

api:
  host: "0.0.0.0"
  port: 8000
  cors_origins: ["http://localhost:3000", "http://localhost:5173"]
  rate_limit:
    enabled: false
    requests_per_minute: 60
